<html class="bg10">

    <head>

        <title id="urlbar"></title>

        <link rel="stylesheet" href="../webassets/css/displays.css">
        <link rel="stylesheet" href="../webassets/css/backgrounds.css">
        <link rel="stylesheet" href="../webassets/css/design.css">
        <script src="../webassets/data.js" defer></script>

        <!--
        
        We keep css, javascript, and text all in seperate places for modularitys sake.
        
        If you want to contribute keep in mind:

        displays.css is used for positioning, padding, anything to do with displays
        design is used for colors, borders, fonts, anything to do with the visuals
        backgrounds is used to differentiate backgrounds (used in <html class=bg#>)
            ^^ backgrounds are stored in /webassets/backgrounds/

        If you want to change css, be sure to see how it affects other pages!
        Try not to make stuff that'll be only on one page and mostly go unused on others
        and if you do, position it at the bottom
                
        -->

    </head>
